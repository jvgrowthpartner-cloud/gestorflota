<!DOCTYPE html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>GestorFlota</title>
    <link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@500;600;700&family=IBM+Plex+Sans:wght@400;500;600;700&display=swap" rel="stylesheet">
    <style>
      *, *::before, *::after { box-sizing: border-box; }
      body { margin: 0; font-family: 'IBM Plex Sans', sans-serif; -webkit-font-smoothing: antialiased; background: #F5F7FA; }
      input, button, select, textarea { font-family: inherit; }
      /* Tarjetas de resumen: 4 en fila en ordenador */
      .stat-grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 16px; }
      /* En móvil, deja hueco para la barra superior y aprovecha mejor el ancho */
      @media (max-width: 767px) {
        main { padding: 64px 14px 24px !important; }
        /* Tarjetas de 2 en 2 en el móvil */
        .stat-grid { grid-template-columns: repeat(2, 1fr); gap: 12px; }
      }
    </style>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
