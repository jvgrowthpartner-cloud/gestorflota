<!DOCTYPE html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>GestorFlota — Gestión de flotas</title>
    <meta name="description" content="Gestiona tu flota: ITV, tacógrafo, vehículos y vencimientos, todo en un sitio. Pruébalo gratis, sin instalar nada." />

    <!-- Vista previa al compartir (WhatsApp, email, redes) -->
    <meta property="og:type" content="website" />
    <meta property="og:url" content="https://gestorflota.vercel.app/" />
    <meta property="og:title" content="GestorFlota — Gestión de flotas" />
    <meta property="og:description" content="Controla ITV, tacógrafo, vehículos y vencimientos de tu flota. Pruébalo gratis, sin instalar nada." />
    <meta property="og:image" content="https://gestorflota.vercel.app/og-image.png" />
    <meta property="og:image:width" content="1200" />
    <meta property="og:image:height" content="630" />
    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:title" content="GestorFlota — Gestión de flotas" />
    <meta name="twitter:description" content="Controla ITV, tacógrafo, vehículos y vencimientos de tu flota. Pruébalo gratis." />
    <meta name="twitter:image" content="https://gestorflota.vercel.app/og-image.png" />
    <link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@500;600;700&family=IBM+Plex+Sans:wght@400;500;600;700&display=swap" rel="stylesheet">
    <style>
      *, *::before, *::after { box-sizing: border-box; }
      body { margin: 0; font-family: 'IBM Plex Sans', sans-serif; -webkit-font-smoothing: antialiased; background: #F5F7FA; }
      input, button, select, textarea { font-family: inherit; }
      /* Tarjetas de resumen: 4 en fila en ordenador */
      .stat-grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 16px; }
      /* Ficha del vehículo: 2 columnas en ordenador */
      .modal-2col { display: grid; grid-template-columns: 1fr 1fr; gap: 24px; }
      /* En móvil, deja hueco para la barra superior y aprovecha mejor el ancho */
      @media (max-width: 767px) {
        main { padding: 64px 14px 24px !important; }
        /* Tarjetas de 2 en 2 en el móvil */
        .stat-grid { grid-template-columns: repeat(2, 1fr); gap: 12px; }
        /* Ficha del vehículo: una sola columna en el móvil */
        .modal-2col { grid-template-columns: 1fr; gap: 18px; }
      }
    </style>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
